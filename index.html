<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorías</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f0ede6; color: #0a0a0a; font-family: 'Space Grotesk', system-ui, sans-serif; }
    input, button { font-family: 'Space Grotesk', system-ui, sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .entry-row .delete-btn { opacity: 0; transition: opacity 0.12s; }
    .entry-row:hover .delete-btn { opacity: 1; }
    #suggestions:empty { display: none; }
    ::placeholder {
      color: #0a0a0a;
      opacity: 0.4;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.7rem;
    }
    .border-hard { border: 2px solid #0a0a0a; }
    .shadow-hard { box-shadow: 3px 3px 0 #0a0a0a; }
    .shadow-hard-sm { box-shadow: 2px 2px 0 #0a0a0a; }
    .btn-blue {
      background: #0055ff; color: #fff; border: 2px solid #0a0a0a;
      box-shadow: 3px 3px 0 #0a0a0a; font-weight: 700;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-blue:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #0a0a0a; }
    .btn-black {
      background: #0a0a0a; color: #fff; border: 2px solid #0a0a0a;
      box-shadow: 3px 3px 0 #555; font-weight: 700;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-black:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #555; }
    .btn-ghost {
      background: #f0ede6; color: #0a0a0a; border: 2px solid #0a0a0a;
      box-shadow: 3px 3px 0 #0a0a0a; font-weight: 700;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-ghost:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #0a0a0a; }
    .meal-btn {
      background: #f0ede6; color: #555; border: 2px solid #ccc;
      font-weight: 600; font-size: 0.75rem; padding: 0.5rem 0.25rem;
      transition: all 0.1s; cursor: pointer; border-radius: 6px;
    }
    .meal-btn.active {
      background: #0a0a0a; color: #fff; border-color: #0a0a0a;
      box-shadow: 2px 2px 0 #555;
    }
    .inp {
      background: #fff; border: 2px solid #0a0a0a; border-radius: 6px;
      padding: 0.6rem 0.75rem; font-size: 0.875rem; width: 100%;
      outline: none; transition: box-shadow 0.1s;
    }
    .inp:focus { box-shadow: 3px 3px 0 #0055ff; }
    .card { background: #fff; border: 2px solid #0a0a0a; border-radius: 8px; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

  <div class="w-full max-w-lg">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="w-10"></div>
      <h1 class="text-3xl font-black tracking-tight">Calorías</h1>
      <button onclick="openPanel()" class="btn-ghost w-10 h-10 flex items-center justify-center rounded-md text-lg" title="Configuración">⚙</button>
    </div>

    <!-- Panel de control -->
    <div id="panel-overlay" class="fixed inset-0 bg-black/40 z-30 hidden" onclick="closePanel()"></div>
    <div id="panel" class="fixed top-0 right-0 h-full w-72 z-40 translate-x-full transition-transform duration-300 flex flex-col" style="background:#f0ede6; border-left: 2px solid #0a0a0a;">
      <div class="flex items-center justify-between px-5 py-4" style="border-bottom:2px solid #0a0a0a;">
        <h2 class="font-black text-base">Configuración</h2>
        <button onclick="closePanel()" class="btn-ghost w-8 h-8 flex items-center justify-center rounded text-lg font-bold">×</button>
      </div>
      <div class="flex-1 overflow-y-auto px-5 py-5 space-y-6">
        <div>
          <label class="block text-xs font-black uppercase tracking-widest mb-2">Objetivo diario</label>
          <div class="flex gap-2">
            <input id="inp-goal" type="number" min="500" max="9999" step="50" class="inp flex-1" placeholder="kcal" />
            <button onclick="saveGoal()" class="btn-blue rounded-md px-4 py-2 text-sm">Guardar</button>
          </div>
          <p id="goal-saved" class="text-xs font-bold text-green-700 mt-1 hidden">✓ Guardado</p>
          <p class="text-xs text-gray-500 mt-2">Actual: <span id="goal-display" class="font-bold text-black"></span> kcal/día</p>
        </div>
      </div>
    </div>

    <!-- Day navigation -->
    <div class="flex items-center justify-between mb-6">
      <button onclick="changeDay(-1)" class="btn-ghost w-12 h-12 flex items-center justify-center rounded-md text-2xl font-black">‹</button>
      <div class="text-center">
        <div id="day-label" class="text-xl font-black"></div>
        <div id="day-sub" class="text-sm text-gray-500 font-medium"></div>
      </div>
      <button onclick="changeDay(1)" id="btn-next" class="btn-ghost w-12 h-12 flex items-center justify-center rounded-md text-2xl font-black disabled:opacity-30 disabled:cursor-not-allowed disabled:shadow-none">›</button>
    </div>

    <!-- Total -->
    <div class="card p-5 mb-6 shadow-hard">
      <div class="flex items-end justify-between mb-3">
        <div>
          <span id="total-cal" class="mono text-5xl font-bold leading-none">0</span>
          <span class="text-lg font-bold text-gray-400 ml-1">kcal</span>
        </div>
        <span id="total-pct" class="mono text-sm font-bold text-gray-400 pb-1">0% del objetivo</span>
      </div>
      <div class="w-full rounded-full overflow-hidden" style="height:10px; background:#e5e0d8; border:1.5px solid #ccc;">
        <div id="progress-bar" class="h-full rounded-full transition-all duration-500" style="width:0%; background:#0055ff;"></div>
      </div>
    </div>

    <!-- Form -->
    <form id="add-form" onsubmit="addEntry(event)" autocomplete="off" class="mb-6 space-y-3">

      <!-- Meal selector -->
      <div class="flex gap-1.5">
        <button type="button" onclick="selectMeal('desayuno')" data-meal="desayuno" class="meal-btn flex-1">🌅<br>Desayuno</button>
        <button type="button" onclick="selectMeal('almuerzo')" data-meal="almuerzo" class="meal-btn flex-1">🌞<br>Almuerzo</button>
        <button type="button" onclick="selectMeal('merienda')" data-meal="merienda" class="meal-btn flex-1">🍎<br>Merienda</button>
        <button type="button" onclick="selectMeal('cena')"     data-meal="cena"     class="meal-btn flex-1">🌙<br>Cena</button>
        <button type="button" onclick="selectMeal('otros')"    data-meal="otros"    class="meal-btn flex-1">📦<br>Otros</button>
      </div>

      <!-- Food search -->
      <div id="mode-search" class="relative">
        <input id="inp-food" type="text" placeholder="Buscar alimento…" class="inp"
          oninput="onFoodInput()" onkeydown="onFoodKey(event)" />
        <div id="suggestions"
          class="absolute z-20 w-full bg-white rounded-md mt-1 shadow-hard overflow-y-auto max-h-52 hidden"
          style="border:2px solid #0a0a0a;"></div>
      </div>

      <!-- Manual name -->
      <div id="mode-manual" class="hidden">
        <input id="inp-manual-name" type="text" placeholder="Nombre del alimento" class="inp" style="border-color:#d97706; box-shadow:none;" />
      </div>

      <!-- Toggle -->
      <div class="text-right">
        <button type="button" id="toggle-mode-btn" onclick="toggleManualMode()"
          class="text-xs font-bold text-gray-400 hover:text-black transition underline underline-offset-2">
          No está en la lista → ingresar manual
        </button>
      </div>

      <!-- Weight row -->
      <div id="row-weight" class="flex gap-2">
        <div class="relative flex-1">
          <input id="inp-weight" type="number" placeholder="Gramos" min="1" class="inp pr-20" oninput="updatePreview()" />
          <span id="kcal-ref" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-gray-400 pointer-events-none"></span>
        </div>
        <div id="calc-preview" class="mono w-28 card flex items-center justify-center text-sm font-bold text-gray-400 shadow-hard-sm">— kcal</div>
        <button type="submit" class="btn-blue rounded-md px-5 text-xl">+</button>
      </div>

      <!-- Manual kcal row -->
      <div id="row-manual-kcal" class="hidden flex gap-2">
        <input id="inp-manual-kcal" type="number" placeholder="Calorías totales (kcal)" min="1" class="inp flex-1" style="border-color:#d97706;" />
        <button type="submit" class="btn-black rounded-md px-5 text-xl" style="background:#d97706; border-color:#92400e; box-shadow: 3px 3px 0 #92400e;">+</button>
      </div>
    </form>

    <!-- Entries list -->
    <div id="entries-list" class="space-y-4 mb-8 min-h-[2rem]"></div>

    <!-- 7-day chart -->
    <div class="card p-4 shadow-hard">
      <h2 class="text-xs font-black uppercase tracking-widest mb-4">Últimos 7 días</h2>
      <div id="week-chart" class="flex items-end justify-between gap-1.5 h-24"></div>
    </div>

  </div>

      // Frutos secos
      { n: 'Almendras', k: 579 },

      { n: 'Azúcar', k: 387 },

      { n: 'Chocolate negro', k: 546 },
      { n: 'Chocolate con leche', k: 535 },
      { n: 'Alfajor', k: 450 },

      { n: 'Helado crema', k: 207 },
      // Bebidas
      { n: 'Jugo de naranja', k: 45 },

      { n: 'Cerveza', k: 43 },
      { n: 'Vino tinto', k: 85 },
      { n: 'Vino blanco', k: 82 },
    ];

    let GOAL = parseInt(localStorage.getItem('goal') || '2000');
    let offset = 0;
    let selectedKcal100 = null;
    let selectedMeal = null;
    let suggestionIndex = -1;
    let apiDebounce = null;
    let manualMode = false;

    const MEALS = [
      { id: 'desayuno', label: '🌅 Desayuno', color: '#0055ff' },
      { id: 'almuerzo', label: '🌞 Almuerzo', color: '#0055ff' },
      { id: 'merienda', label: '🍎 Merienda', color: '#0055ff' },
      { id: 'cena',     label: '🌙 Cena',     color: '#0055ff' },
      { id: 'otros',    label: '📦 Otros',    color: '#0055ff' },
    ];

    // ── Panel ────────────────────────────────────────────────────────────────
    function openPanel() {
      document.getElementById('inp-goal').value = GOAL;
      document.getElementById('goal-display').textContent = GOAL;
      document.getElementById('goal-saved').classList.add('hidden');
      document.getElementById('panel').classList.remove('translate-x-full');
      document.getElementById('panel-overlay').classList.remove('hidden');
    }
    function closePanel() {
      document.getElementById('panel').classList.add('translate-x-full');
      document.getElementById('panel-overlay').classList.add('hidden');
    }
    function saveGoal() {
      const val = parseInt(document.getElementById('inp-goal').value);
      if (!val || val < 500) return;
      GOAL = val;
      localStorage.setItem('goal', val);
      document.getElementById('goal-display').textContent = val;
      document.getElementById('goal-saved').classList.remove('hidden');
      render();
    }

    // ── Manual mode ──────────────────────────────────────────────────────────
    function toggleManualMode() {
      manualMode = !manualMode;
      document.getElementById('mode-search').classList.toggle('hidden', manualMode);
      document.getElementById('mode-manual').classList.toggle('hidden', !manualMode);
      document.getElementById('row-weight').classList.toggle('hidden', manualMode);
      document.getElementById('row-manual-kcal').classList.toggle('hidden', !manualMode);
      document.getElementById('toggle-mode-btn').textContent = manualMode
        ? '← Volver a búsqueda'
        : 'No está en la lista → ingresar manual';
      selectedKcal100 = null;
      hideSuggestions();
      if (manualMode) document.getElementById('inp-manual-name').focus();
      else document.getElementById('inp-food').focus();
    }

    // ── Meal selector ────────────────────────────────────────────────────────
    function selectMeal(meal) {
      selectedMeal = meal;
      document.querySelectorAll('.meal-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.meal === meal);
      });
    }

    // ── Storage ──────────────────────────────────────────────────────────────
    function getEntries(iso) {
      try { return JSON.parse(localStorage.getItem(`cal_${iso}`) || '[]'); }
      catch { return []; }
    }
    function saveEntries(iso, entries) {
      localStorage.setItem(`cal_${iso}`, JSON.stringify(entries));
    }
    function nextId(entries) {
      return entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1;
    }

    // ── Date helpers ─────────────────────────────────────────────────────────
    function isoDate(off = 0) {
      const d = new Date();
      d.setDate(d.getDate() + off);
      return d.toISOString().slice(0, 10);
    }
    function friendlyDate(iso) {
      const [y, m, day] = iso.split('-').map(Number);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const target = new Date(y, m - 1, day);
      const diff = Math.round((target - today) / 86400000);
      const special = { 0: 'Hoy', '-1': 'Ayer', 1: 'Mañana' };
      const weekday = target.toLocaleDateString('es-AR', { weekday: 'long' });
      const full = target.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      return { main: special[diff] ?? cap(weekday), sub: full };
    }
    function colorFor(total) {
      const pct = total / GOAL;
      if (pct < 0.75) return { bar: '#16a34a', text: '#16a34a' };
      if (pct < 1.00) return { bar: '#d97706', text: '#d97706' };
      return { bar: '#dc2626', text: '#dc2626' };
    }

    // ── Autocomplete ─────────────────────────────────────────────────────────
    function onFoodInput() {
      selectedKcal100 = null;
      document.getElementById('kcal-ref').textContent = '';
      document.getElementById('calc-preview').textContent = '— kcal';
      document.getElementById('calc-preview').style.color = '#9ca3af';
      const q = document.getElementById('inp-food').value.trim().toLowerCase();
      if (!q) { hideSuggestions(); return; }
      const local = FOODS.filter(f => normalize(f.n).includes(normalize(q))).slice(0, 6);
      showSuggestions(local, []);
      clearTimeout(apiDebounce);
      if (q.length >= 3) {
        apiDebounce = setTimeout(() => fetchOpenFoodFacts(q, local), 500);
      }
    }

    function normalize(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    }

    async function fetchOpenFoodFacts(q, alreadyShown) {
      try {
        const url = `https://il.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${encodeURIComponent(q)}&fields=product_name,nutriments&json=1&page_size=8`;
        const res = await fetch(url);
        const data = await res.json();
        const apiResults = (data.products || [])
          .filter(p => p.product_name && p.nutriments?.['energy-kcal_100g'])
          .map(p => ({ n: p.product_name, k: Math.round(p.nutriments['energy-kcal_100g']) }))
          .filter(p => !alreadyShown.some(a => normalize(a.n) === normalize(p.n)))
          .slice(0, 5);
        const currentQ = document.getElementById('inp-food').value.trim().toLowerCase();
        if (normalize(currentQ) === normalize(q)) showSuggestions(alreadyShown, apiResults);
      } catch {}
    }

    function showSuggestions(local, api) {
      const box = document.getElementById('suggestions');
      const all = [...local.map(f => ({...f, source:'local'})), ...api.map(f => ({...f, source:'api'}))];
      if (!all.length) { hideSuggestions(); return; }
      suggestionIndex = -1;
      box.innerHTML = all.map(f => `
        <div class="suggestion-item px-3 py-2.5 text-sm cursor-pointer hover:bg-blue-50 flex justify-between items-center"
             data-kcal="${f.k}" data-name="${esc(f.n)}"
             onmousedown="selectFood('${esc(f.n)}', ${f.k})" style="border-bottom:1px solid #eee;">
          <span class="font-medium">${esc(f.n)}</span>
          <span class="text-gray-400 text-xs ml-2 shrink-0 font-bold">${f.k} kcal/100g</span>
        </div>`).join('');
      box.classList.remove('hidden');
    }

    function hideSuggestions() {
      document.getElementById('suggestions').classList.add('hidden');
      suggestionIndex = -1;
    }

    function selectFood(name, kcal100) {
      document.getElementById('inp-food').value = name;
      selectedKcal100 = kcal100;
      document.getElementById('kcal-ref').textContent = `${kcal100}/100g`;
      hideSuggestions();
      updatePreview();
      document.getElementById('inp-weight').focus();
    }

    function onFoodKey(e) {
      const items = document.querySelectorAll('.suggestion-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); suggestionIndex = Math.min(suggestionIndex+1, items.length-1); highlightSuggestion(items); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); suggestionIndex = Math.max(suggestionIndex-1, 0); highlightSuggestion(items); }
      else if (e.key === 'Enter' && suggestionIndex >= 0) { e.preventDefault(); const item = items[suggestionIndex]; selectFood(item.dataset.name, parseInt(item.dataset.kcal)); }
      else if (e.key === 'Escape') hideSuggestions();
    }

    function highlightSuggestion(items) {
      items.forEach((el, i) => el.style.background = i === suggestionIndex ? '#eff6ff' : '');
    }

    // ── Calorie preview ──────────────────────────────────────────────────────
    function updatePreview() {
      const weight = parseFloat(document.getElementById('inp-weight').value);
      const preview = document.getElementById('calc-preview');
      if (selectedKcal100 && weight > 0) {
        const cal = Math.round(selectedKcal100 * weight / 100);
        preview.textContent = `${cal} kcal`;
        preview.style.color = '#0055ff';
      } else {
        preview.textContent = '— kcal';
        preview.style.color = '#9ca3af';
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const iso = isoDate(offset);
      const entries = getEntries(iso);
      const total = entries.reduce((s, e) => s + e.calories, 0);
      const pct = Math.min(Math.round((total / GOAL) * 100), 100);
      const c = colorFor(total);

      document.getElementById('total-cal').textContent = total;
      const pctEl = document.getElementById('total-pct');
      pctEl.textContent = `${Math.round((total/GOAL)*100)}% del objetivo`;
      pctEl.style.color = total > 0 ? c.text : '#9ca3af';
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-bar').style.background = total > 0 ? c.bar : '#0055ff';

      const list = document.getElementById('entries-list');
      if (!entries.length) {
        list.innerHTML = '<p class="text-center text-gray-400 text-sm py-6 font-medium">Sin entradas para este día.</p>';
      } else {
        const byMeal = {};
        entries.forEach(e => { const m = e.meal||'otros'; if (!byMeal[m]) byMeal[m]=[]; byMeal[m].push(e); });
        list.innerHTML = MEALS.filter(m => byMeal[m.id]).map(m => {
          const group = byMeal[m.id];
          const groupTotal = group.reduce((s,e) => s+e.calories, 0);
          const rows = group.map(e => `
            <div class="entry-row flex items-center justify-between px-3 py-2.5 text-sm" style="border-bottom:1px solid #f0ede6;">
              <div class="flex-1 min-w-0">
                <div class="truncate font-semibold">${esc(e.name)}</div>
                ${e.weight ? `<div class="text-xs text-gray-400">${e.weight}g · ${e.kcal100} kcal/100g</div>` : ''}
              </div>
              <span class="mono font-bold mx-3 shrink-0">${e.calories} kcal</span>
              <button class="delete-btn text-red-500 hover:text-red-700 text-base leading-none shrink-0 font-bold"
                onclick="deleteEntry('${iso}', ${e.id})">✕</button>
            </div>`).join('');
          return `
            <div class="card shadow-hard-sm overflow-hidden">
              <div class="flex items-center justify-between px-3 py-2" style="background:#0a0a0a;">
                <span class="text-xs font-black text-white uppercase tracking-widest">${m.label}</span>
                <span class="mono text-xs font-bold text-white">${groupTotal} kcal</span>
              </div>
              ${rows}
            </div>`;
        }).join('');
      }

      updateDayLabel();
      renderChart();
    }

    function updateDayLabel() {
      const { main, sub } = friendlyDate(isoDate(offset));
      document.getElementById('day-label').textContent = main;
      document.getElementById('day-sub').textContent = sub;
      document.getElementById('btn-next').disabled = offset >= 0;
    }

    function renderChart() {
      const chart = document.getElementById('week-chart');
      chart.innerHTML = '';
      const days = Array.from({ length: 7 }, (_, i) => {
        const iso = isoDate(-(6-i));
        const total = getEntries(iso).reduce((s,e) => s+e.calories, 0);
        return { iso, total };
      });
      const maxVal = Math.max(...days.map(d => d.total), GOAL);
      days.forEach(({ iso, total }) => {
        const heightPct = total > 0 ? Math.max((total/maxVal)*100, 5) : 3;
        const c = colorFor(total);
        const { main } = friendlyDate(iso);
        const label = main === 'Hoy' ? 'Hoy' : main === 'Ayer' ? 'Ayer' : main.slice(0,3);
        const isActive = iso === isoDate(offset);
        const col = document.createElement('div');
        col.className = 'flex flex-col items-center flex-1 cursor-pointer group';
        col.onclick = () => {
          const today = new Date(); today.setHours(0,0,0,0);
          const [y,m,d] = iso.split('-').map(Number);
          offset = Math.round((new Date(y,m-1,d) - today) / 86400000);
          render();
        };
        col.innerHTML = `
          <div class="text-xs mb-1 font-bold transition ${isActive ? 'text-black' : 'text-gray-400 group-hover:text-gray-600'}">${total > 0 ? total : ''}</div>
          <div class="w-full transition-all" style="height:${heightPct}%; background:${total > 0 ? c.bar : '#d1cdc7'}; border:${isActive ? '2px solid #0a0a0a' : '1px solid transparent'}; border-radius:3px;"></div>
          <div class="text-xs mt-1 font-bold ${isActive ? 'text-black' : 'text-gray-400'}">${label}</div>`;
        chart.appendChild(col);
      });
    }

    // ── Actions ──────────────────────────────────────────────────────────────
    function addEntry(e) {
      e.preventDefault();
      if (!selectedMeal) { alert('Seleccioná una comida primero.'); return; }
      const iso = isoDate(offset);
      const entries = getEntries(iso);
      if (manualMode) {
        const name = document.getElementById('inp-manual-name').value.trim();
        const calories = parseInt(document.getElementById('inp-manual-kcal').value);
        if (!name || !calories || calories <= 0) return;
        entries.push({ id: nextId(entries), name, calories, meal: selectedMeal });
        saveEntries(iso, entries);
        document.getElementById('inp-manual-name').value = '';
        document.getElementById('inp-manual-kcal').value = '';
        document.getElementById('inp-manual-name').focus();
      } else {
        if (!selectedKcal100) {
          document.getElementById('inp-food').setCustomValidity('Seleccioná un alimento de la lista');
          document.getElementById('inp-food').reportValidity(); return;
        }
        document.getElementById('inp-food').setCustomValidity('');
        const name = document.getElementById('inp-food').value.trim();
        const weight = parseFloat(document.getElementById('inp-weight').value);
        const calories = Math.round(selectedKcal100 * weight / 100);
        entries.push({ id: nextId(entries), name, calories, weight, kcal100: selectedKcal100, meal: selectedMeal });
        saveEntries(iso, entries);
        document.getElementById('inp-food').value = '';
        document.getElementById('inp-weight').value = '';
        document.getElementById('kcal-ref').textContent = '';
        document.getElementById('calc-preview').textContent = '— kcal';
        document.getElementById('calc-preview').style.color = '#9ca3af';
        selectedKcal100 = null;
        document.getElementById('inp-food').focus();
      }
      render();
    }

    function deleteEntry(iso, id) {
      saveEntries(iso, getEntries(iso).filter(e => e.id !== id));
      render();
    }

    function changeDay(delta) {
      if (offset + delta > 0) return;
      offset += delta;
      render();
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#inp-food') && !e.target.closest('#suggestions')) hideSuggestions();
    });

    render();
  </script>
</body>
</html>
