<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Calorías</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .entry-row .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .entry-row:hover .delete-btn { opacity: 1; }
    #suggestions:empty { display: none; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center py-8 px-4">

  <div class="w-full max-w-lg">
    <div class="flex items-center justify-between mb-6">
      <div class="w-8"></div>
      <h1 class="text-2xl font-bold tracking-tight">🥗 Calorías</h1>
      <button onclick="openPanel()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 transition text-gray-400 hover:text-white" title="Panel de control">
        ⚙️
      </button>
    </div>

    <!-- Panel de control -->
    <div id="panel-overlay" class="fixed inset-0 bg-black/60 z-30 hidden" onclick="closePanel()"></div>
    <div id="panel" class="fixed top-0 right-0 h-full w-72 bg-gray-900 border-l border-gray-800 z-40 translate-x-full transition-transform duration-300 flex flex-col">
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-800">
        <h2 class="font-semibold text-sm tracking-wide">Panel de control</h2>
        <button onclick="closePanel()" class="text-gray-400 hover:text-white text-xl leading-none">×</button>
      </div>
      <div class="flex-1 overflow-y-auto px-5 py-4 space-y-6">

        <!-- Objetivo diario -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Objetivo diario</label>
          <div class="flex gap-2">
            <input id="inp-goal" type="number" min="500" max="9999" step="50"
              class="flex-1 bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="kcal" />
            <button onclick="saveGoal()"
              class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-4 py-2 text-sm font-semibold">
              Guardar
            </button>
          </div>
          <p id="goal-saved" class="text-xs text-emerald-400 mt-1 hidden">✓ Guardado</p>
          <p class="text-xs text-gray-500 mt-2">Actual: <span id="goal-display"></span> kcal/día</p>
        </div>

      </div>
    </div>

    <!-- Day navigation -->
    <div class="flex items-center justify-between mb-4">
      <button onclick="changeDay(-1)" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition text-xl leading-none">‹</button>
      <div class="text-center">
        <div id="day-label" class="text-lg font-semibold"></div>
        <div id="day-sub" class="text-xs text-gray-400"></div>
      </div>
      <button onclick="changeDay(1)" id="btn-next" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition text-xl leading-none disabled:opacity-30 disabled:cursor-not-allowed">›</button>
    </div>

    <!-- Total badge -->
    <div class="flex justify-center mb-6">
      <div id="total-badge" class="flex flex-col items-center justify-center w-36 h-36 rounded-full border-4 transition-colors duration-500 border-gray-700">
        <span id="total-cal" class="text-3xl font-bold">0</span>
        <span class="text-xs text-gray-400 mt-1">kcal</span>
        <span id="total-pct" class="text-xs font-semibold mt-1 text-gray-500">0% del objetivo</span>
      </div>
    </div>

    <!-- Add form -->
    <form id="add-form" onsubmit="addEntry(event)" autocomplete="off" class="mb-6 space-y-2">

      <!-- Meal selector -->
      <div class="flex gap-1">
        <button type="button" onclick="selectMeal('desayuno')" data-meal="desayuno"
          class="meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border border-transparent bg-gray-800 text-gray-400">🌅 Desayuno</button>
        <button type="button" onclick="selectMeal('almuerzo')" data-meal="almuerzo"
          class="meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border border-transparent bg-gray-800 text-gray-400">🌞 Almuerzo</button>
        <button type="button" onclick="selectMeal('merienda')" data-meal="merienda"
          class="meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border border-transparent bg-gray-800 text-gray-400">🍎 Merienda</button>
        <button type="button" onclick="selectMeal('cena')" data-meal="cena"
          class="meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border border-transparent bg-gray-800 text-gray-400">🌙 Cena</button>
        <button type="button" onclick="selectMeal('otros')" data-meal="otros"
          class="meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border border-transparent bg-gray-800 text-gray-400">📦 Otros</button>
      </div>

      <!-- Food search -->
      <div id="mode-search" class="relative">
        <input id="inp-food" type="text" placeholder="Buscar alimento…"
          class="w-full bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          oninput="onFoodInput()" onkeydown="onFoodKey(event)" />
        <div id="suggestions"
          class="absolute z-20 w-full bg-gray-800 border border-gray-700 rounded-lg mt-1 shadow-xl overflow-y-auto max-h-52 hidden"></div>
      </div>

      <!-- Manual name (hidden by default) -->
      <div id="mode-manual" class="hidden">
        <input id="inp-manual-name" type="text" placeholder="Nombre del alimento"
          class="w-full bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
      </div>

      <!-- Toggle -->
      <div class="text-right">
        <button type="button" id="toggle-mode-btn" onclick="toggleManualMode()"
          class="text-xs text-gray-500 hover:text-gray-300 transition underline underline-offset-2">
          No está en la lista → ingresar manual
        </button>
      </div>

      <!-- Weight + preview + add (modo búsqueda) -->
      <div id="row-weight" class="flex gap-2">
        <div class="relative flex-1">
          <input id="inp-weight" type="number" placeholder="Gramos" min="1"
            class="w-full bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 pr-20"
            oninput="updatePreview()" />
          <span id="kcal-ref" class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-500 pointer-events-none"></span>
        </div>
        <div id="calc-preview"
          class="w-24 flex items-center justify-center bg-gray-900 rounded-lg text-sm font-mono text-gray-400">— kcal</div>
        <button type="submit"
          class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-4 py-2 text-sm font-semibold">+</button>
      </div>

      <!-- Manual kcal row (hidden by default) -->
      <div id="row-manual-kcal" class="hidden flex gap-2">
        <input id="inp-manual-kcal" type="number" placeholder="Calorías totales (kcal)" min="1"
          class="flex-1 bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" />
        <button type="submit"
          class="bg-amber-600 hover:bg-amber-500 transition rounded-lg px-4 py-2 text-sm font-semibold">+</button>
      </div>
    </form>

    <!-- Entries list -->
    <div id="entries-list" class="space-y-2 mb-8 min-h-[2rem]"></div>

    <!-- 7-day chart -->
    <div class="bg-gray-900 rounded-xl p-4">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Últimos 7 días</h2>
      <div id="week-chart" class="flex items-end justify-between gap-1 h-24"></div>
    </div>
  </div>

    let GOAL = parseInt(localStorage.getItem('goal') || '2000');
    let offset = 0;
    let selectedKcal100 = null;
    let selectedMeal = null;
    let suggestionIndex = -1;
    let apiDebounce = null;
    let manualMode = false;

    const MEALS = [
      { id: 'desayuno', label: '🌅 Desayuno' },
      { id: 'almuerzo', label: '🌞 Almuerzo' },
      { id: 'merienda', label: '🍎 Merienda' },
      { id: 'cena',     label: '🌙 Cena' },
      { id: 'otros',    label: '📦 Otros' },
    ];

    function toggleManualMode() {
      manualMode = !manualMode;
      document.getElementById('mode-search').classList.toggle('hidden', manualMode);
      document.getElementById('mode-manual').classList.toggle('hidden', !manualMode);
      document.getElementById('row-weight').classList.toggle('hidden', manualMode);
      document.getElementById('row-manual-kcal').classList.toggle('hidden', !manualMode);
      document.getElementById('toggle-mode-btn').textContent = manualMode
        ? '← Volver a búsqueda'
        : 'No está en la lista → ingresar manual';
      selectedKcal100 = null;
      hideSuggestions();
      if (manualMode) document.getElementById('inp-manual-name').focus();
      else document.getElementById('inp-food').focus();
    }

    function selectMeal(meal) {
      selectedMeal = meal;
      document.querySelectorAll('.meal-btn').forEach(btn => {
        const active = btn.dataset.meal === meal;
        btn.className = `meal-btn flex-1 py-1.5 rounded-lg text-xs font-semibold transition border ${
          active ? 'border-indigo-500 bg-indigo-600/20 text-indigo-300' : 'border-transparent bg-gray-800 text-gray-400'
        }`;
      });
    }

    // ── Storage ──────────────────────────────────────────────────────────────
    function getEntries(iso) {
      try { return JSON.parse(localStorage.getItem(`cal_${iso}`) || '[]'); }
      catch { return []; }
    }
    function saveEntries(iso, entries) {
      localStorage.setItem(`cal_${iso}`, JSON.stringify(entries));
    }
    function nextId(entries) {
      return entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1;
    }

    // ── Date helpers ─────────────────────────────────────────────────────────
    function isoDate(off = 0) {
      const d = new Date();
      d.setDate(d.getDate() + off);
      return d.toISOString().slice(0, 10);
    }
    function friendlyDate(iso) {
      const [y, m, day] = iso.split('-').map(Number);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const target = new Date(y, m - 1, day);
      const diff = Math.round((target - today) / 86400000);
      const special = { 0: 'Hoy', '-1': 'Ayer', 1: 'Mañana' };
      const weekday = target.toLocaleDateString('es-AR', { weekday: 'long' });
      const full = target.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      return { main: special[diff] ?? cap(weekday), sub: full };
    }
    function colorFor(total) {
      const pct = total / GOAL;
      if (pct < 0.75) return { ring: 'border-emerald-500', text: 'text-emerald-400', bar: '#10b981' };
      if (pct < 1.00) return { ring: 'border-yellow-400', text: 'text-yellow-300', bar: '#facc15' };
      return { ring: 'border-red-500', text: 'text-red-400', bar: '#ef4444' };
    }

    // ── Autocomplete ─────────────────────────────────────────────────────────
    function onFoodInput() {
      selectedKcal100 = null;
      document.getElementById('kcal-ref').textContent = '';
      document.getElementById('calc-preview').textContent = '— kcal';
      const q = document.getElementById('inp-food').value.trim().toLowerCase();
      if (!q) { hideSuggestions(); return; }

      const local = FOODS.filter(f => normalize(f.n).includes(normalize(q))).slice(0, 6);
      showSuggestions(local, []);

      clearTimeout(apiDebounce);
      if (q.length >= 3) {
        apiDebounce = setTimeout(() => fetchOpenFoodFacts(q, local), 500);
      }
    }

    function normalize(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    }

    async function fetchOpenFoodFacts(q, alreadyShown) {
      try {
        const url = `https://il.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${encodeURIComponent(q)}&fields=product_name,nutriments&json=1&page_size=8`;
        const res = await fetch(url);
        const data = await res.json();
        const apiResults = (data.products || [])
          .filter(p => p.product_name && p.nutriments?.['energy-kcal_100g'])
          .map(p => ({ n: p.product_name, k: Math.round(p.nutriments['energy-kcal_100g']) }))
          .filter(p => !alreadyShown.some(a => normalize(a.n) === normalize(p.n)))
          .slice(0, 5);
        const currentQ = document.getElementById('inp-food').value.trim().toLowerCase();
        if (normalize(currentQ) === normalize(q)) {
          showSuggestions(alreadyShown, apiResults);
        }
      } catch { /* sin internet: solo local */ }
    }

    function showSuggestions(local, api) {
      const box = document.getElementById('suggestions');
      const all = [
        ...local.map(f => ({ ...f, source: 'local' })),
        ...api.map(f => ({ ...f, source: 'api' })),
      ];
      if (!all.length) { hideSuggestions(); return; }
      suggestionIndex = -1;
      box.innerHTML = all.map((f, i) => `
        <div class="suggestion-item px-3 py-2 text-sm cursor-pointer hover:bg-gray-700 flex justify-between items-center"
             data-kcal="${f.k}" data-name="${esc(f.n)}"
             onmousedown="selectFood('${esc(f.n)}', ${f.k})">
          <span>${esc(f.n)}</span>
          <span class="text-gray-400 text-xs ml-2 shrink-0">${f.k} kcal/100g</span>
        </div>`).join('');
      box.classList.remove('hidden');
    }

    function hideSuggestions() {
      document.getElementById('suggestions').classList.add('hidden');
      suggestionIndex = -1;
    }

    function selectFood(name, kcal100) {
      document.getElementById('inp-food').value = name;
      selectedKcal100 = kcal100;
      document.getElementById('kcal-ref').textContent = `${kcal100}/100g`;
      hideSuggestions();
      updatePreview();
      document.getElementById('inp-weight').focus();
    }

    function onFoodKey(e) {
      const items = document.querySelectorAll('.suggestion-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        suggestionIndex = Math.min(suggestionIndex + 1, items.length - 1);
        highlightSuggestion(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        suggestionIndex = Math.max(suggestionIndex - 1, 0);
        highlightSuggestion(items);
      } else if (e.key === 'Enter' && suggestionIndex >= 0) {
        e.preventDefault();
        const item = items[suggestionIndex];
        selectFood(item.dataset.name, parseInt(item.dataset.kcal));
      } else if (e.key === 'Escape') {
        hideSuggestions();
      }
    }

    function highlightSuggestion(items) {
      items.forEach((el, i) => el.classList.toggle('bg-gray-700', i === suggestionIndex));
    }

    // ── Calorie preview ──────────────────────────────────────────────────────
    function updatePreview() {
      const weight = parseFloat(document.getElementById('inp-weight').value);
      const preview = document.getElementById('calc-preview');
      if (selectedKcal100 && weight > 0) {
        const cal = Math.round(selectedKcal100 * weight / 100);
        preview.textContent = `${cal} kcal`;
        preview.className = 'w-24 flex items-center justify-center bg-gray-900 rounded-lg text-sm font-mono text-indigo-300 font-semibold';
      } else {
        preview.textContent = '— kcal';
        preview.className = 'w-24 flex items-center justify-center bg-gray-900 rounded-lg text-sm font-mono text-gray-400';
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const iso = isoDate(offset);
      const entries = getEntries(iso);
      const total = entries.reduce((s, e) => s + e.calories, 0);

      const pct = Math.round((total / GOAL) * 100);
      const c = colorFor(total);
      const badge = document.getElementById('total-badge');
      badge.className = `flex flex-col items-center justify-center w-36 h-36 rounded-full border-4 transition-colors duration-500 ${total > 0 ? c.ring : 'border-gray-700'}`;
      document.getElementById('total-cal').textContent = total;
      const pctEl = document.getElementById('total-pct');
      pctEl.className = `text-xs font-semibold mt-1 ${total > 0 ? c.text : 'text-gray-500'}`;
      pctEl.textContent = `${pct}% del objetivo`;

      const list = document.getElementById('entries-list');
      if (!entries.length) {
        list.innerHTML = '<p class="text-center text-gray-600 text-sm py-4">Sin entradas para este día.</p>';
      } else {
        const byMeal = {};
        entries.forEach(e => {
          const m = e.meal || 'otros';
          if (!byMeal[m]) byMeal[m] = [];
          byMeal[m].push(e);
        });
        list.innerHTML = MEALS
          .filter(m => byMeal[m.id])
          .map(m => {
            const group = byMeal[m.id];
            const groupTotal = group.reduce((s, e) => s + e.calories, 0);
            const rows = group.map(e => `
              <div class="entry-row flex items-center justify-between bg-gray-800 rounded-lg px-4 py-2 text-sm">
                <div class="flex-1 min-w-0">
                  <div class="truncate">${esc(e.name)}</div>
                  ${e.weight ? `<div class="text-xs text-gray-500">${e.weight}g · ${e.kcal100} kcal/100g</div>` : ''}
                </div>
                <span class="text-gray-300 font-mono mx-3 shrink-0">${e.calories} kcal</span>
                <button class="delete-btn text-red-400 hover:text-red-300 text-base leading-none shrink-0"
                  onclick="deleteEntry('${iso}', ${e.id})">✕</button>
              </div>`).join('');
            return `
              <div class="mb-4">
                <div class="flex items-center justify-between mb-1 px-1">
                  <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">${m.label}</span>
                  <span class="text-xs text-gray-500 font-mono">${groupTotal} kcal</span>
                </div>
                <div class="space-y-1">${rows}</div>
              </div>`;
          }).join('');
      }

      updateDayLabel();
      renderChart();
    }

    function updateDayLabel() {
      const { main, sub } = friendlyDate(isoDate(offset));
      document.getElementById('day-label').textContent = main;
      document.getElementById('day-sub').textContent = sub;
      document.getElementById('btn-next').disabled = offset >= 0;
    }

    function renderChart() {
      const chart = document.getElementById('week-chart');
      chart.innerHTML = '';
      const days = Array.from({ length: 7 }, (_, i) => {
        const iso = isoDate(-(6 - i));
        const total = getEntries(iso).reduce((s, e) => s + e.calories, 0);
        return { iso, total };
      });
      const maxVal = Math.max(...days.map(d => d.total), GOAL);
      days.forEach(({ iso, total }) => {
        const heightPct = total > 0 ? Math.max((total / maxVal) * 100, 4) : 0;
        const c = colorFor(total);
        const { main } = friendlyDate(iso);
        const label = main === 'Hoy' ? 'Hoy' : main === 'Ayer' ? 'Ayer' : main.slice(0, 3);
        const isActive = iso === isoDate(offset);
        const col = document.createElement('div');
        col.className = 'flex flex-col items-center flex-1 cursor-pointer group';
        col.onclick = () => {
          const today = new Date(); today.setHours(0, 0, 0, 0);
          const [y, m, d] = iso.split('-').map(Number);
          offset = Math.round((new Date(y, m - 1, d) - today) / 86400000);
          render();
        };
        col.innerHTML = `
          <div class="text-xs mb-1 transition ${isActive ? 'text-white font-semibold' : 'text-gray-500 group-hover:text-gray-300'}">${total > 0 ? total : ''}</div>
          <div class="w-full rounded-t-sm transition-all ${isActive ? 'opacity-100' : 'opacity-60 group-hover:opacity-90'}"
               style="height:${heightPct}%; background:${total > 0 ? c.bar : '#374151'}; min-height:${total > 0 ? '4px' : '2px'}"></div>
          <div class="text-xs mt-1 ${isActive ? 'text-white font-semibold' : 'text-gray-500'}">${label}</div>`;
        chart.appendChild(col);
      });
    }

    // ── Actions ──────────────────────────────────────────────────────────────
    function addEntry(e) {
      e.preventDefault();
      if (!selectedMeal) {
        alert('Seleccioná una comida (Desayuno, Almuerzo, etc.)');
        return;
      }
      const iso = isoDate(offset);
      const entries = getEntries(iso);

      if (manualMode) {
        const name = document.getElementById('inp-manual-name').value.trim();
        const calories = parseInt(document.getElementById('inp-manual-kcal').value);
        if (!name || !calories || calories <= 0) return;
        entries.push({ id: nextId(entries), name, calories, meal: selectedMeal });
        saveEntries(iso, entries);
        document.getElementById('inp-manual-name').value = '';
        document.getElementById('inp-manual-kcal').value = '';
        document.getElementById('inp-manual-name').focus();
      } else {
        if (!selectedKcal100) {
          document.getElementById('inp-food').setCustomValidity('Seleccioná un alimento de la lista');
          document.getElementById('inp-food').reportValidity();
          return;
        }
        document.getElementById('inp-food').setCustomValidity('');
        const name = document.getElementById('inp-food').value.trim();
        const weight = parseFloat(document.getElementById('inp-weight').value);
        const calories = Math.round(selectedKcal100 * weight / 100);
        entries.push({ id: nextId(entries), name, calories, weight, kcal100: selectedKcal100, meal: selectedMeal });
        saveEntries(iso, entries);
        document.getElementById('inp-food').value = '';
        document.getElementById('inp-weight').value = '';
        document.getElementById('kcal-ref').textContent = '';
        document.getElementById('calc-preview').textContent = '— kcal';
        selectedKcal100 = null;
        document.getElementById('inp-food').focus();
      }
      render();
    }

    function deleteEntry(iso, id) {
      saveEntries(iso, getEntries(iso).filter(e => e.id !== id));
      render();
    }

    function changeDay(delta) {
      if (offset + delta > 0) return;
      offset += delta;
      render();
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Panel ────────────────────────────────────────────────────────────────
    function openPanel() {
      document.getElementById('inp-goal').value = GOAL;
      document.getElementById('goal-display').textContent = GOAL;
      document.getElementById('goal-saved').classList.add('hidden');
      document.getElementById('panel').classList.remove('translate-x-full');
      document.getElementById('panel-overlay').classList.remove('hidden');
    }
    function closePanel() {
      document.getElementById('panel').classList.add('translate-x-full');
      document.getElementById('panel-overlay').classList.add('hidden');
    }
    function saveGoal() {
      const val = parseInt(document.getElementById('inp-goal').value);
      if (!val || val < 500) return;
      GOAL = val;
      localStorage.setItem('goal', val);
      document.getElementById('goal-display').textContent = val;
      document.getElementById('goal-saved').classList.remove('hidden');
      render();
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#inp-food') && !e.target.closest('#suggestions')) hideSuggestions();
    });

    render();
  </script>
</body>
</html>
