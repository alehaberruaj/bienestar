<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Calorías</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .entry-row .delete-btn { opacity: 0; transition: opacity 0.15s; }
    .entry-row:hover .delete-btn { opacity: 1; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center py-8 px-4">

  <div class="w-full max-w-lg">
    <h1 class="text-2xl font-bold tracking-tight text-center mb-6">🥗 Calorías</h1>

    <!-- Day navigation -->
    <div class="flex items-center justify-between mb-4">
      <button onclick="changeDay(-1)" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition text-xl leading-none">‹</button>
      <div class="text-center">
        <div id="day-label" class="text-lg font-semibold"></div>
        <div id="day-sub" class="text-xs text-gray-400"></div>
      </div>
      <button onclick="changeDay(1)" id="btn-next" class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition text-xl leading-none disabled:opacity-30 disabled:cursor-not-allowed">›</button>
    </div>

    <!-- Total badge -->
    <div class="flex justify-center mb-6">
      <div id="total-badge" class="flex flex-col items-center justify-center w-36 h-36 rounded-full border-4 transition-colors duration-500 border-gray-700">
        <span id="total-cal" class="text-3xl font-bold">0</span>
        <span class="text-xs text-gray-400 mt-1">kcal</span>
        <span id="total-pct" class="text-xs font-semibold mt-1 text-gray-500">0% del objetivo</span>
      </div>
    </div>

    <!-- Add form -->
    <form id="add-form" class="flex gap-2 mb-6" onsubmit="addEntry(event)">
      <input id="inp-name" type="text" placeholder="Alimento…"
        class="flex-1 bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required autocomplete="off" />
      <input id="inp-cal" type="number" placeholder="kcal" min="1"
        class="w-24 bg-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
      <button type="submit"
        class="bg-indigo-600 hover:bg-indigo-500 transition rounded-lg px-4 py-2 text-sm font-semibold">+</button>
    </form>

    <!-- Entries list -->
    <div id="entries-list" class="space-y-2 mb-8 min-h-[2rem]"></div>

    <!-- 7-day chart -->
    <div class="bg-gray-900 rounded-xl p-4">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Últimos 7 días</h2>
      <div id="week-chart" class="flex items-end justify-between gap-1 h-24"></div>
    </div>
  </div>

  <script>
    const GOAL = 2000;
    let offset = 0; // days from today

    // ── Storage helpers ──────────────────────────────────────────────────────
    function storageKey(iso) { return `cal_${iso}`; }

    function getEntries(iso) {
      try { return JSON.parse(localStorage.getItem(storageKey(iso)) || '[]'); }
      catch { return []; }
    }

    function saveEntries(iso, entries) {
      localStorage.setItem(storageKey(iso), JSON.stringify(entries));
    }

    function nextId(entries) {
      return entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1;
    }

    // ── Date helpers ─────────────────────────────────────────────────────────
    function isoDate(off = 0) {
      const d = new Date();
      d.setDate(d.getDate() + off);
      return d.toISOString().slice(0, 10);
    }

    function friendlyDate(iso) {
      const [y, m, day] = iso.split('-').map(Number);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const target = new Date(y, m - 1, day);
      const diff = Math.round((target - today) / 86400000);
      const special = { 0: 'Hoy', '-1': 'Ayer', 1: 'Mañana' };
      const weekday = target.toLocaleDateString('es-AR', { weekday: 'long' });
      const full = target.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      return { main: special[diff] ?? cap(weekday), sub: full };
    }

    function colorFor(total) {
      const pct = total / GOAL;
      if (pct < 0.75) return { ring: 'border-emerald-500', text: 'text-emerald-400', bar: '#10b981' };
      if (pct < 1.00) return { ring: 'border-yellow-400', text: 'text-yellow-300', bar: '#facc15' };
      return { ring: 'border-red-500', text: 'text-red-400', bar: '#ef4444' };
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const iso = isoDate(offset);
      const entries = getEntries(iso);
      const total = entries.reduce((s, e) => s + e.calories, 0);

      // Badge
      const pct = Math.round((total / GOAL) * 100);
      const c = colorFor(total);
      const badge = document.getElementById('total-badge');
      badge.className = `flex flex-col items-center justify-center w-36 h-36 rounded-full border-4 transition-colors duration-500 ${total > 0 ? c.ring : 'border-gray-700'}`;
      document.getElementById('total-cal').textContent = total;
      const pctEl = document.getElementById('total-pct');
      pctEl.className = `text-xs font-semibold mt-1 ${total > 0 ? c.text : 'text-gray-500'}`;
      pctEl.textContent = `${pct}% del objetivo`;

      // List
      const list = document.getElementById('entries-list');
      if (entries.length === 0) {
        list.innerHTML = '<p class="text-center text-gray-600 text-sm py-4">Sin entradas para este día.</p>';
      } else {
        list.innerHTML = entries.map(e => `
          <div class="entry-row flex items-center justify-between bg-gray-800 rounded-lg px-4 py-2 text-sm">
            <span class="flex-1 truncate">${esc(e.name)}</span>
            <span class="text-gray-300 font-mono mr-3">${e.calories} kcal</span>
            <button class="delete-btn text-red-400 hover:text-red-300 text-base leading-none"
              onclick="deleteEntry('${iso}', ${e.id})">✕</button>
          </div>`).join('');
      }

      // Day label
      updateDayLabel();
      renderChart();
    }

    function updateDayLabel() {
      const { main, sub } = friendlyDate(isoDate(offset));
      document.getElementById('day-label').textContent = main;
      document.getElementById('day-sub').textContent = sub;
      document.getElementById('btn-next').disabled = offset >= 0;
    }

    function renderChart() {
      const chart = document.getElementById('week-chart');
      chart.innerHTML = '';
      const days = Array.from({ length: 7 }, (_, i) => {
        const iso = isoDate(-(6 - i));
        const total = getEntries(iso).reduce((s, e) => s + e.calories, 0);
        return { iso, total };
      });
      const maxVal = Math.max(...days.map(d => d.total), GOAL);

      days.forEach(({ iso, total }) => {
        const heightPct = total > 0 ? Math.max((total / maxVal) * 100, 4) : 0;
        const c = colorFor(total);
        const { main } = friendlyDate(iso);
        const label = main === 'Hoy' ? 'Hoy' : main === 'Ayer' ? 'Ayer' : main.slice(0, 3);
        const isActive = iso === isoDate(offset);

        const col = document.createElement('div');
        col.className = 'flex flex-col items-center flex-1 cursor-pointer group';
        col.onclick = () => {
          const today = new Date(); today.setHours(0, 0, 0, 0);
          const [y, m, d] = iso.split('-').map(Number);
          offset = Math.round((new Date(y, m - 1, d) - today) / 86400000);
          render();
        };
        col.innerHTML = `
          <div class="text-xs mb-1 transition ${isActive ? 'text-white font-semibold' : 'text-gray-500 group-hover:text-gray-300'}">${total > 0 ? total : ''}</div>
          <div class="w-full rounded-t-sm transition-all ${isActive ? 'opacity-100' : 'opacity-60 group-hover:opacity-90'}"
               style="height:${heightPct}%; background:${total > 0 ? c.bar : '#374151'}; min-height:${total > 0 ? '4px' : '2px'}"></div>
          <div class="text-xs mt-1 ${isActive ? 'text-white font-semibold' : 'text-gray-500'}">${label}</div>`;
        chart.appendChild(col);
      });
    }

    // ── Actions ──────────────────────────────────────────────────────────────
    function addEntry(e) {
      e.preventDefault();
      const iso = isoDate(offset);
      const entries = getEntries(iso);
      entries.push({
        id: nextId(entries),
        name: document.getElementById('inp-name').value.trim(),
        calories: parseInt(document.getElementById('inp-cal').value),
      });
      saveEntries(iso, entries);
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-cal').value = '';
      document.getElementById('inp-name').focus();
      render();
    }

    function deleteEntry(iso, id) {
      const entries = getEntries(iso).filter(e => e.id !== id);
      saveEntries(iso, entries);
      render();
    }

    function changeDay(delta) {
      if (offset + delta > 0) return;
      offset += delta;
      render();
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
